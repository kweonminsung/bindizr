apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bindizr-stack.fullname" . }}
  labels:
    {{- include "bindizr-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: bindizr
spec:
  replicas: {{ .Values.bindizr.replicas }}
  selector:
    matchLabels:
      {{- include "bindizr-stack.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: bindizr
  template:
    metadata:
      labels:
        {{- include "bindizr-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bindizr
      {{- with .Values.bindizr.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "bindizr-stack.serviceAccountName" . }}
      {{- with .Values.bindizr.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: bindizr
          image: "{{ .Values.bindizr.image.repository }}:{{ .Values.bindizr.image.tag }}"
          imagePullPolicy: {{ .Values.bindizr.image.pullPolicy }}
          command:
            - bindizr
            - start
            - --config
            - /etc/bindizr-template/bindizr.conf.toml
          ports:
            - name: api
              containerPort: {{ .Values.bindizr.api.port }}
              protocol: TCP
            - name: dns-tcp
              containerPort: {{ .Values.bindizr.dns.port }}
              protocol: TCP
            - name: dns-udp
              containerPort: {{ .Values.bindizr.dns.port }}
              protocol: UDP
          env:
            - name: BINDIZR_API_LISTEN_ADDR
              value: {{ .Values.bindizr.api.listenAddr | quote }}
            - name: BINDIZR_API_PORT
              value: {{ .Values.bindizr.api.port | quote }}
            - name: BINDIZR_API_REQUIRE_AUTHENTICATION
              value: {{ .Values.bindizr.api.requireAuthentication | quote }}
            - name: BINDIZR_DATABASE_TYPE
              value: {{ .Values.bindizr.database.type | quote }}
            - name: BINDIZR_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "bindizr-stack.databaseSecretName" . }}
                  key: {{ .Values.bindizr.database.secretKey }}
            - name: BINDIZR_DNS_PORT
              value: {{ .Values.bindizr.dns.port | quote }}
            - name: BINDIZR_DNS_LISTEN_ADDR
              value: {{ .Values.bindizr.dns.listenAddr | quote }}
            - name: BINDIZR_SECONDARY_ADDRS
              value: "{{- $fullname := include "bindizr-stack.fullname" . -}}{{- $headless := printf "%s-bind9-headless" $fullname -}}{{- range $i, $_ := until (.Values.bind9.replicas | int) -}}{{- if $i }},{{ end -}}{{ printf "%s-bind9-%d.%s:53" $fullname $i $headless }}{{- end }}"
            - name: BINDIZR_NOTIFY_RETRIES
              value: {{ .Values.bindizr.dns.notifyRetries | quote }}
            - name: BINDIZR_NOTIFY_TIMEOUT_SECS
              value: {{ .Values.bindizr.dns.notifyTimeoutSecs | quote }}
            - name: BINDIZR_NSUPDATE_TSIG_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "bindizr-stack.tsigSecretName" . }}
                  key: {{ .Values.tsig.keyName }}
                  optional: true
            - name: BINDIZR_LOG_LEVEL
              value: {{ .Values.bindizr.logging.level | quote }}
          {{- with .Values.bindizr.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.bindizr.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config-template
              mountPath: /etc/bindizr-template
              readOnly: true
      volumes:
        - name: config-template
          configMap:
            name: {{ include "bindizr-stack.fullname" . }}-config
      {{- with .Values.bindizr.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.bindizr.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.bindizr.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
