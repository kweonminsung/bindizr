apiVersion: v1
kind: Service
metadata:
  name: {{ include "bindizr-stack.fullname" . }}-api
  labels:
    {{- include "bindizr-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: bindizr
spec:
  type: {{ .Values.bindizr.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.bindizr.api.service.port }}
      targetPort: api
      protocol: TCP
  selector:
    {{- include "bindizr-stack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: bindizr
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bindizr-stack.fullname" . }}-dns
  labels:
    {{- include "bindizr-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: bindizr
spec:
  type: ClusterIP
  ports:
    - name: dns-tcp
      port: {{ .Values.bindizr.dns.service.port }}
      targetPort: dns-tcp
      protocol: TCP
    - name: dns-udp
      port: {{ .Values.bindizr.dns.service.port }}
      targetPort: dns-udp
      protocol: UDP
  selector:
    {{- include "bindizr-stack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: bindizr
