openapi: 3.0.0
servers: []
# servers:
#   - url: http://localhost:3000
#     description: Local development server
info:
  description: This is the API documentation for Bindizr
  version: "1.0.0"
  title: Bindizr HTTP API
  contact:
    email: kevin136583@gmail.com
  license:
    name: Apache 2.0
    url: 'http://www.apache.org/licenses/LICENSE-2.0.html'
tags:
  - name: Zone
    description: Manage DNS zones including creation, update, deletion, and retrieval.
  - name: Record
    description: Manage DNS records including creation, update, deletion, and retrieval.
paths:
  /zones:
    get:
      tags:
        - Zone
      summary: List all DNS zones
      operationId: get_zones
      description: Retrieves a list of all DNS zones.
      responses:
        '200':
          description: A list of DNS zones
          content:
            application/json:
              schema:
                type: object
                properties:
                  zones:
                    type: array
                    items:
                      $ref: '#/components/schemas/GetZoneResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
    post:
      tags:
        - Zone
      summary: Create a new DNS zone
      operationId: create_zone
      description: Creates a new DNS zone with the specified details.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateZoneRequest'
      responses:
        '201':
          description: DNS zone created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetZoneResponse'
        '400':
          description: Bad request, invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /zones/{zone_name}:
    get:
      tags:
        - Zone
      summary: Get a specific DNS zone
      operationId: get_zone
      description: Retrieves details of a specific DNS zone by its name.
      parameters:
        - name: zone_name
          in: path
          required: true
          description: The name of the DNS zone to retrieve.
          schema:
            type: string
        - name: records
          in: query
          required: false
          description: Whether to include the history of the DNS zone.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Details of the DNS zone
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetZoneResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
    put:
      tags:
        - Zone
      summary: Update a specific DNS zone
      operationId: update_zone
      description: Updates the details of a specific DNS zone.
      parameters:
        - name: zone_name
          in: path
          required: true
          description: The name of the DNS zone to update.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateZoneRequest'
      responses:
        '200':
          description: DNS zone updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetZoneResponse'
        '400':
          description: Bad request, invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
    delete:
      tags:
        - Zone
      summary: Delete a specific DNS zone
      operationId: delete_zone
      description: Deletes a specific DNS zone by its name.
      parameters:
        - name: zone_name
          in: path
          required: true
          description: The name of the DNS zone to delete.
          schema:
            type: string
      responses:
        '200':
          description: DNS zone deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Zone deleted successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /records:
    get:
      tags:
        - Record
      summary: List all DNS records
      operationId: get_records
      description: Retrieves a list of all DNS records.
      parameters:
        - name: zone_name
          in: query
          required: false
          description: The name of the DNS zone to filter records by.
          schema:
            type: string
            example: example.com
      responses:
        '200':
          description: A list of DNS records
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items:
                      $ref: '#/components/schemas/GetRecordResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
    post:
      tags:
        - Record
      summary: Create a new DNS record
      operationId: create_record
      description: Creates a new DNS record with the specified details.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecordRequest'
      responses:
        '201':
          description: DNS record created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetRecordResponse'
        '400':
          description: Bad request, invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /records/{record_name}/{record_type}:
    get:
      tags:
        - Record
      summary: Get a specific DNS record
      operationId: get_record
      description: Retrieves details of a specific DNS record by its name and type.
      parameters:
        - name: record_name
          in: path
          required: true
          description: The name of the DNS record to retrieve.
          schema:
            type: string
        - name: record_type
          in: path
          required: true
          description: The type of the DNS record to retrieve.
          schema:
            type: string
      responses:
        '200':
          description: Details of the DNS record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetRecordResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
    put:
      tags:
        - Record
      summary: Update a specific DNS record
      operationId: update_record
      description: Updates the details of a specific DNS record.
      parameters:
        - name: record_name
          in: path
          required: true
          description: The name of the DNS record to update.
          schema:
            type: string
        - name: record_type
          in: path
          required: true
          description: The type of the DNS record to update.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecordRequest'
      responses:
        '200':
          description: DNS record updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetRecordResponse'
        '400':
          description: Bad request, invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
    delete:
      tags:
        - Record
      summary: Delete a specific DNS record
      operationId: delete_record
      description: Deletes a specific DNS record by its name and type.
      parameters:
        - name: record_name
          in: path
          required: true
          description: The name of the DNS record to delete.
          schema:
            type: string
        - name: record_type
          in: path
          required: true
          description: The type of the DNS record to delete.
          schema:
            type: string
      responses:
        '200':
          description: DNS record deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Record deleted successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  
  schemas:
    BadRequestError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: Invalid input data
    UnauthorizedError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: No authorization header
    GetZoneResponse:
      type: object
      required:
        - id
        - name
        - primary_ns
        - admin_email
        - ttl
        - refresh
        - retry
        - expire
        - minimum_ttl
      properties:
        id:
          type: integer
          format: int32
          example: 1
        name:
          type: string
          example: example.com
        primary_ns:
          type: string
          example: ns1.example.com
        admin_email:
          type: string
          format: email
          example: admin@example.com
        ttl:
          type: integer
          format: int32
          example: 3600
        serial:
          type: integer
          format: int32
          example: 2025100101
        refresh:
          type: integer
          format: int32
          example: 7200
        retry:
          type: integer
          format: int32
          example: 3600
        expire:
          type: integer
          format: int32
          example: 604800
        minimum_ttl:
          type: integer
          format: int32
          example: 3600
    CreateZoneRequest:
      type: object
      required:
        - name
        - primary_ns
        - admin_email
        - ttl
      properties:
        name:
          type: string
          example: example.com
        primary_ns:
          type: string
          example: ns1.example.com
        admin_email:
          type: string
          format: email
          example: admin@example.com
        ttl:
          type: integer
          format: int32
          example: 3600
        serial:
          type: integer
          format: int32
          description: Optional. Auto-generated in YYYYMMDDNN format if not provided
          example: 2025100101
        refresh:
          type: integer
          format: int32
          example: 7200
        retry:
          type: integer
          format: int32
          example: 3600
        expire:
          type: integer
          format: int32
          example: 604800
        minimum_ttl:
          type: integer
          format: int32
          example: 3600
    GetRecordResponse:
      type: object
      required:
        - id
        - name
        - record_type
        - value
        - zone_id
      properties:
        id:
          type: integer
          format: int32
          example: 1
        name:
          type: string
          example: sub
        record_type:
          type: string
          enum: [A, AAAA, CNAME, MX, TXT, NS, SOA, SRV, PTR]
          example: A
        value:
          type: string
          example: 127.0.0.1
        ttl:
          type: integer
          format: int32
          example: 3600
        priority:
          type: integer
          format: int32
          example: 10
        zone_id:
          type: integer
          format: int32
          example: 1
        zone_name:
          type: string
          example: example.com
    CreateRecordRequest:
      type: object
      required:
        - name
        - record_type
        - value
        - zone_name
      properties:
        name:
          type: string
          example: sub
          description: The name of the DNS record
        record_type:
          type: string
          enum: [A, AAAA, CNAME, MX, TXT, NS, SOA, SRV, PTR]
          example: A
          description: The type of the DNS record
        value:
          type: string
          example: 192.168.1.100
          description: The value of the DNS record
        ttl:
          type: integer
          format: int32
          example: 3600
          description: Time to live in seconds (optional)
        priority:
          type: integer
          format: int32
          example: 10
          description: Priority for MX and SRV records (optional)
        zone_name:
          type: string
          example: example.com
          description: The name of the zone this record belongs to


