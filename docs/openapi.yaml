info:
  description: This is the API documentation for Bindizr
  version: "1.0.0"
  title: Bindizr HTTP API
  contact:
    email: kevin136583@gmail.com
  license:
    name: Apache 2.0
    url: 'http://www.apache.org/licenses/LICENSE-2.0.html'
tags:
  - name: Zone
    description: Manage DNS zones including creation, update, deletion, and retrieval.
  - name: Zone History
    description: Manage DNS zone history including creation, update, deletion, and retrieval.
  - name: Record
    description: Manage DNS records including creation, update, deletion, and retrieval.
  - name: Record History
    description: Manage DNS record history including creation, update, deletion, and retrieval.
  - name: DNS Server
    description: Manage DNS server instances including creation, update, deletion, and retrieval.
  - name: Key
    description: Manage RNDC/TSIG keys for DNS server authentication.
  - name: Zone DNS Config
    description: Manage the association between zones and DNS servers.
  - name: DNS Operations
    description: DNS server operations including status check, reload, and configuration.
paths:
  /zones:
    get:
      tags:
        - Zone
      summary: List all DNS zones
      operationId: get_zones
      description: Retrieves a list of all DNS zones.
      responses:
        '200':
          description: A list of DNS zones
          content:
            application/json:
              schema:
                type: object
                properties:
                  zones:
                    type: array
                    items:
                      $ref: '#/components/schemas/GetZoneResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
    post:
      tags:
        - Zone
      summary: Create a new DNS zone
      operationId: create_zone
      description: Creates a new DNS zone with the specified details.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateZoneRequest'
      responses:
        '201':
          description: DNS zone created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetZoneResponse'
        '400':
          description: Bad request, invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /zones/{zone_name}:
    get:
      tags:
        - Zone
      summary: Get a specific DNS zone
      operationId: get_zone
      description: Retrieves details of a specific DNS zone by its name.
      parameters:
        - name: zone_name
          in: path
          required: true
          description: The name of the DNS zone to retrieve.
          schema:
            type: string
        - name: records
          in: query
          required: false
          description: Whether to include the history of the DNS zone.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Details of the DNS zone
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetZoneResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
    put:
      tags:
        - Zone
      summary: Update a specific DNS zone
      operationId: update_zone
      description: Updates the details of a specific DNS zone.
      parameters:
        - name: zone_name
          in: path
          required: true
          description: The name of the DNS zone to update.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateZoneRequest'
      responses:
        '200':
          description: DNS zone updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetZoneResponse'
        '400':
          description: Bad request, invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
    delete:
      tags:
        - Zone
      summary: Delete a specific DNS zone
      operationId: delete_zone
      description: Deletes a specific DNS zone by its name.
      parameters:
        - name: zone_name
          in: path
          required: true
          description: The name of the DNS zone to delete.
          schema:
            type: string
      responses:
        '200':
          description: DNS zone deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Zone deleted successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /zones/{zone_name}/rendered:
    get:
      tags:
        - Zone
      summary: Get rendered DNS zone file
      operationId: get_zone_rendered
      description: Retrieves the rendered content of a specific DNS zone file.
      parameters:
        - name: zone_name
          in: path
          required: true
          description: The name of the DNS zone to retrieve.
          schema:
            type: string
      responses:
        '200':
          description: Rendered DNS zone file content
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/GetZoneRenderedResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /zones/{zone_name}/histories:
    get:
      tags:
        - Zone History
      summary: List history of a specific DNS zone
      operationId: get_zone_histories
      description: Retrieves the history of changes made to a specific DNS zone.
      parameters:
        - name: zone_name
          in: path
          required: true
          description: The name of the DNS zone to retrieve history for.
          schema:
            type: string
      responses:
        '200':
          description: A list of DNS zone history entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  zone_histories:
                    type: array
                    items:
                      $ref: '#/components/schemas/GetZoneHistoryResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /zones/{zone_name}/histories/{history_id}:
    delete:
      tags:
        - Zone History
      summary: Delete a specific DNS zone history
      operationId: delete_zone_history
      description: Deletes a specific history of a DNS zone by its ID.
      parameters:
        - name: zone_name
          in: path
          required: true
          description: The name of the DNS zone to delete history for.
          schema:
            type: string
        - name: history_id
          in: path
          required: true
          description: The ID of the history to delete.
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: DNS zone history deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Zone history deleted successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /records:
    get:
      tags:
        - Record
      summary: List all DNS records
      operationId: get_records
      description: Retrieves a list of all DNS records.
      parameters:
        - name: zone_name
          in: query
          required: false
          description: The name of the DNS zone to filter records by.
          schema:
            type: string
            example: example.com
      responses:
        '200':
          description: A list of DNS records
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items:
                      $ref: '#/components/schemas/GetRecordResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
    post:
      tags:
        - Record
      summary: Create a new DNS record
      operationId: create_record
      description: Creates a new DNS record with the specified details.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecordRequest'
      responses:
        '201':
          description: DNS record created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetRecordResponse'
        '400':
          description: Bad request, invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
