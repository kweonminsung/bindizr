security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  
  schemas:
    BadRequestError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: Invalid input data
    UnauthorizedError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: No authorization header
    GetZoneResponse:
      type: object
      required:
        - id
        - name
        - primary_ns
        - primary_ns_ip
        - primary_ns_ipv6
        - admin_email
        - ttl
        - refresh
        - retry
        - expire
        - minimum_ttl
      properties:
        id:
          type: integer
          format: int32
          example: 1
        name:
          type: string
          example: example.com
        primary_ns:
          type: string
          example: ns1.example.com
        primary_ns_ip:
          type: string
          format: ipv4
          example: 127.0.0.1
        primary_ns_ipv6:
          type: string
          format: ipv6
          example: "::1"
        admin_email:
          type: string
          format: email
          example: admin@example.com
        ttl:
          type: integer
          format: int32
          example: 3600
        serial:
          type: integer
          format: int32
          example: 2025100101
        refresh:
          type: integer
          format: int32
          example: 7200
        retry:
          type: integer
          format: int32
          example: 3600
        expire:
          type: integer
          format: int32
          example: 604800
        minimum_ttl:
          type: integer
          format: int32
          example: 3600
    GetZoneRenderedResponse:
      type: string
      description: Rendered zone file content
      example: |
        $ORIGIN example.com.
        @   3600 IN SOA ns1.example.com. hostmaster.example.com. (
              2025100101 ; serial
              7200       ; refresh
              3600       ; retry
              604800     ; expire
              3600 )     ; minimum_ttl
        @   3600 IN NS ns1.example.com.
    CreateZoneRequest:
      type: object
      required:
        - name
        - primary_ns
        - admin_email
        - ttl
        - serial
      anyOf:
        - required: [primary_ns_ip]
        - required: [primary_ns_ipv6]
      properties:
        name:
          type: string
          example: example.com
        primary_ns:
          type: string
          example: ns1.example.com
        primary_ns_ip:
          type: string
          format: ipv4
          example: 127.0.0.1
        primary_ns_ipv6:
          type: string
          format: ipv6
          example: "::1"
        admin_email:
          type: string
          format: email
          example: admin@example.com
        ttl:
          type: integer
          format: int32
          example: 3600
        serial:
          type: integer
          format: int32
          example: 2025100101
        refresh:
          type: integer
          format: int32
          example: 7200
        retry:
          type: integer
          format: int32
          example: 3600
        expire:
          type: integer
          format: int32
          example: 604800
        minimum_ttl:
          type: integer
          format: int32
          example: 3600
    GetZoneHistoryResponse:
      type: object
      required:
        - id
        - log
        - created_at
        - zone_name
      properties:
        id:
          type: integer
          format: int32
          example: 1
        log:
          type: string
          example: "[2025-10-01 12:00:00] Zone created: id=1, name=example.com"
        created_at:
          type: string
          format: date-time
          example: '2023-10-01T12:00:00Z'
        zone_name:
          type: string
          example: example.com
    GetRecordResponse:
      type: object
      required:
        - id
        - name
        - record_type
        - value
        - zone_id
      properties:
        id:
          type: integer
          format: int32
          example: 1
        name:
          type: string
          example: sub
        record_type:
          type: string
          enum: [A, AAAA, CNAME, MX, TXT, NS, SOA, SRV, PTR]
          example: A
        value:
          type: string
          example: 127.0.0.1
        zone_id:
          type: integer
          format: int32
          example: 1
        zone_name:
          type: string
          example: example.com
    CreateRecordRequest:
      type: object
      required:
        - name
        - record_type
        - value
        - zone_name
      properties:
        name:
