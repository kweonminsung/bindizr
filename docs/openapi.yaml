openapi: 3.1.0
info:
  title: Bindizr HTTP API
  description: This is the API documentation for Bindizr
  contact:
    email: kevin136583@gmail.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
paths:
  /records:
    get:
      tags:
      - Record
      summary: List all DNS records
      operationId: get_records
      parameters:
      - name: zone_name
        in: query
        description: The name of the DNS zone to filter records by.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: A list of DNS records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
      - Record
      summary: Create a new DNS record
      operationId: create_record
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecordRequest'
        required: true
      responses:
        '201':
          description: DNS record created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordResponse'
        '400':
          description: Bad request, invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /records/{record_id}:
    get:
      tags:
      - Record
      summary: Get a specific DNS record
      operationId: get_record
      parameters:
      - name: record_id
        in: path
        description: The ID of the DNS record to retrieve.
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: Details of the DNS record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
      - Record
      summary: Update a specific DNS record
      operationId: update_record
      parameters:
      - name: record_id
        in: path
        description: The ID of the DNS record to update.
        required: true
        schema:
          type: integer
          format: int32
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRecordRequest'
        required: true
      responses:
        '200':
          description: DNS record updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordResponse'
        '400':
          description: Bad request, invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - Record
      summary: Delete a specific DNS record
      operationId: delete_record
      parameters:
      - name: record_id
        in: path
        description: The ID of the DNS record to delete.
        required: true
        schema:
          type: integer
          format: int32
      responses:
        '200':
          description: DNS record deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /zones:
    get:
      tags:
      - Zone
      summary: List all DNS zones
      operationId: get_zones
      responses:
        '200':
          description: A list of DNS zones
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZoneListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
      - Zone
      summary: Create a new DNS zone
      operationId: create_zone
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateZoneRequest'
        required: true
      responses:
        '201':
          description: DNS zone created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZoneResponse'
        '400':
          description: Bad request, invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /zones/{name}:
    get:
      tags:
      - Zone
      summary: Get a specific DNS zone
      operationId: get_zone
      parameters:
      - name: name
        in: path
        description: The name of the DNS zone to retrieve.
        required: true
        schema:
          type: string
      - name: records
        in: query
        description: Whether to include records for the DNS zone.
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Details of the DNS zone
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZoneDetailResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Zone not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
      - Zone
      summary: Update a specific DNS zone
      operationId: update_zone
      parameters:
      - name: name
        in: path
        description: The name of the DNS zone to update.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateZoneRequest'
        required: true
      responses:
        '200':
          description: DNS zone updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZoneResponse'
        '400':
          description: Bad request, invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Zone not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - Zone
      summary: Delete a specific DNS zone
      operationId: delete_zone
      parameters:
      - name: name
        in: path
        description: The name of the DNS zone to delete.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: DNS zone deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Zone not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    CreateRecordRequest:
      type: object
      required:
      - name
      - record_type
      - value
      - zone_name
      properties:
        name:
          type: string
          example: sub
        priority:
          type:
          - integer
          - 'null'
          format: int32
          example: 10
        record_type:
          type: string
          example: A
        ttl:
          type:
          - integer
          - 'null'
          format: int32
          example: 3600
        value:
          $ref: '#/components/schemas/RecordValueRequest'
        zone_name:
          type: string
          example: example.com
    CreateZoneRequest:
      type: object
      required:
      - name
      - primary_ns
      - admin_email
      - ttl
      properties:
        admin_email:
          type: string
          example: admin@example.com
        expire:
          type:
          - integer
          - 'null'
          format: int32
          example: 604800
        minimum_ttl:
          type:
          - integer
          - 'null'
          format: int32
          example: 3600
        name:
          type: string
          example: example.com
        primary_ns:
          type: string
          example: ns1.example.com
        refresh:
          type:
          - integer
          - 'null'
          format: int32
          example: 7200
        retry:
          type:
          - integer
          - 'null'
          format: int32
          example: 3600
        serial:
          type:
          - integer
          - 'null'
          format: int32
          example: 2025100101
        ttl:
          type: integer
          format: int32
          example: 3600
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          type: string
          example: 'Bad request: invalid input data'
    GetRecordResponse:
      type: object
      required:
      - id
      - name
      - record_type
      - value
      - zone_id
      properties:
        id:
          type: integer
          format: int32
          example: 1
        name:
          type: string
          example: sub
        priority:
          type:
          - integer
          - 'null'
          format: int32
          example: 10
        record_type:
          type: string
          example: A
        ttl:
          type:
          - integer
          - 'null'
          format: int32
          example: 3600
        value: {}
        zone_id:
          type: integer
          format: int32
          example: 1
        zone_name:
          type:
          - string
          - 'null'
          example: example.com
    GetZoneResponse:
      type: object
      required:
      - id
      - name
      - primary_ns
      - admin_email
      - ttl
      - refresh
      - retry
      - expire
      - minimum_ttl
      properties:
        admin_email:
          type: string
          example: admin@example.com
        expire:
          type: integer
          format: int32
          example: 604800
        id:
          type: integer
          format: int32
          example: 1
        minimum_ttl:
          type: integer
          format: int32
          example: 3600
        name:
          type: string
          example: example.com
        primary_ns:
          type: string
          example: ns1.example.com
        refresh:
          type: integer
          format: int32
          example: 7200
        retry:
          type: integer
          format: int32
          example: 3600
        serial:
          type:
          - integer
          - 'null'
          format: int32
          example: 2025100101
        ttl:
          type: integer
          format: int32
          example: 3600
    MessageResponse:
      type: object
      required:
      - message
      properties:
        message:
          type: string
          example: Record deleted successfully
    RecordListResponse:
      type: object
      required:
      - records
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/GetRecordResponse'
    RecordResponse:
      type: object
      required:
      - record
      properties:
        record:
          $ref: '#/components/schemas/GetRecordResponse'
    RecordValueRequest:
      oneOf:
      - type: string
        example: 192.168.1.100
      - type: array
        items:
          type: string
        example:
        - hello
        - world
    UpdateRecordRequest:
      type: object
      required:
      - name
      - record_type
      - value
      properties:
        name:
          type: string
          example: sub
        priority:
          type:
          - integer
          - 'null'
          format: int32
          example: 10
        record_type:
          type: string
          example: A
        ttl:
          type:
          - integer
          - 'null'
          format: int32
          example: 3600
        value:
          $ref: '#/components/schemas/RecordValueRequest'
    ZoneDetailResponse:
      type: object
      required:
      - zone
      - records
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/GetRecordResponse'
        zone:
          $ref: '#/components/schemas/GetZoneResponse'
    ZoneListResponse:
      type: object
      required:
      - zones
      properties:
        zones:
          type: array
          items:
            $ref: '#/components/schemas/GetZoneResponse'
    ZoneResponse:
      type: object
      required:
      - zone
      properties:
        zone:
          $ref: '#/components/schemas/GetZoneResponse'
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
security:
- bearer_auth: []
tags:
- name: Zone
  description: Manage DNS zones including creation, update, deletion, and retrieval.
- name: Record
  description: Manage DNS records including creation, update, deletion, and retrieval.
