services:
  bindizr:
    image: kweonminsung/bindizr:0.1.0-beta.5
    environment:
      BINDIZR_DATABASE_TYPE: mysql
      BINDIZR_DATABASE_URL: mysql://bindizr:bindizr@mysql:3306/bindizr
      BINDIZR_API_LISTEN_ADDR: "0.0.0.0"
      BINDIZR_API_PORT: "8000"
      BINDIZR_DNS_LISTEN_ADDR: "0.0.0.0"
      BINDIZR_DNS_PORT: "53"
      BINDIZR_LOG_LEVEL: info
      BINDIZR_API_REQUIRE_AUTHENTICATION: "false"
      BINDIZR_SECONDARY_ADDRS: tasks.bind9:53
      BINDIZR_NOTIFY_RETRIES: "3"
      BINDIZR_NOTIFY_TIMEOUT_SECS: "3"
      BINDIZR_NSUPDATE_TSIG_KEY_NAME: nsupdate-key
      BINDIZR_NSUPDATE_TSIG_KEY: ""
    ports:
      - target: 8000
        published: 8000
        protocol: tcp
        mode: ingress
    volumes:
      - bindizr-data:/var/lib/bindizr
    networks:
      - bindizr-net
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  bind9:
    image: internetsystemsconsortium/bind9:9.21
    command:
      - /bin/sh
      - -ec
      - |
        BINDIZR_IP=$$(getent hosts bindizr)
        BINDIZR_IP=$${BINDIZR_IP%% *}
        sed "s/__BINDIZR_PRIMARY__/$${BINDIZR_IP}/g" /etc/bind/named.conf.template > /tmp/named.conf
        exec named -g -c /tmp/named.conf
    configs:
      - source: bind9_named_template
        target: /etc/bind/named.conf.template
    ports:
      - target: 53
        published: 53
        protocol: tcp
        mode: host
      - target: 53
        published: 53
        protocol: udp
        mode: host
    volumes:
      - bind9-cache:/var/cache/bind
      - bind9-data:/var/lib/bind
    networks:
      - bindizr-net
    deploy:
      mode: global
      restart_policy:
        condition: any

  mysql:
    image: mysql:9.7
    environment:
      MYSQL_DATABASE: bindizr
      MYSQL_USER: bindizr
      MYSQL_PASSWORD: bindizr
      MYSQL_ROOT_PASSWORD: bindizr-root
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - bindizr-net
    deploy:
      replicas: 1
      restart_policy:
        condition: any

configs:
  bind9_named_template:
    file: ./docker/bind9/named.swarm.conf.template

networks:
  bindizr-net:
    driver: overlay
    attachable: true

volumes:
  bindizr-data:
  bind9-cache:
  bind9-data:
  mysql-data:
