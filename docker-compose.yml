services:
  bindizr:
    build:
      context: .
    image: bindizr:local
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      BINDIZR_DATABASE_TYPE: mysql
      DATABASE_URL: mysql://bindizr:bindizr@mysql:3306/bindizr
      BINDIZR_API_PORT: 8000
      BINDIZR_DNS_PORT: 53
      BINDIZR_LOG_LEVEL: info
      BINDIZR_API_REQUIRE_AUTHENTICATION: "false"
      BINDIZR_SECONDARY_ADDRS: ""
      BINDIZR_NSUPDATE_TSIG_KEY: ""
    ports:
      - "8000:8000/tcp"
      - "53:53/tcp"
      - "53:53/udp"
    volumes:
      - bindizr-data:/var/lib/bindizr
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: bindizr
      MYSQL_USER: bindizr
      MYSQL_PASSWORD: bindizr
      MYSQL_ROOT_PASSWORD: bindizr-root
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -ubindizr -pbindizr --silent",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

volumes:
  bindizr-data:
  mysql-data:
